<html>
<head>
  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      background-size: 400% 400%;
      animation: gradientFlow 15s ease infinite;
      color: white;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }

    @keyframes gradientFlow {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    #CanvasContainer {
      position: fixed;
      z-index: -1;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      display: block;
    }

    #timearea {
      margin: 0 auto;
      width: 500px;
      text-align: center;
      position: relative;
      top: 20%;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 15px;
      padding: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    #timearea div {
      margin: 10px 0;
    }

    #timearea .time {
      font-size: 72px;
      font-weight: bold;
      text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
    }

    #timearea .date {
      font-size: 20px;
      color: #d1d1d1;
    }
  </style>
</head>
<body onload="ChangeTimeSize()">
  <canvas id="CanvasContainer">not support</canvas>
  <div id="timearea">
    <div class="time"></div>
    <div class="date"></div>
  </div>

  <script type="text/javascript">
    const mycanvas = document.getElementById('CanvasContainer');
    const ctx = mycanvas.getContext('2d');

    let StartPoint = { x: 0, y: 0 };
    let EndPoint = { x: 0, y: 0 };

    function drawLine(startPoint, endPoint) {
      ctx.beginPath();
      ctx.moveTo(startPoint.x, startPoint.y);
      ctx.lineTo(endPoint.x, endPoint.y);
      ctx.lineWidth = 1;
      ctx.strokeStyle = `rgba(${Math.random() * 255}, ${Math.random() * 255}, ${Math.random() * 255}, 0.8)`;
      ctx.lineCap = 'round';
      ctx.stroke();
    }

    window.addEventListener('resize', () => {
      mycanvas.height = window.innerHeight;
      mycanvas.width = window.innerWidth;
    });

    function ChangeTimeSize() {
      mycanvas.height = window.innerHeight;
      mycanvas.width = window.innerWidth;
    }

    const timeArea = document.getElementById("timearea");
    const timeDiv = timeArea.querySelector(".time");
    const dateDiv = timeArea.querySelector(".date");

    Date.prototype.format = function (fmt) {
      const weeks = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
      const o = {
        "M+": this.getMonth() + 1,
        "W": weeks[this.getDay()],
        "d+": this.getDate(),
        "h+": this.getHours(),
        "m+": this.getMinutes(),
        "s+": this.getSeconds(),
        "q+": Math.floor((this.getMonth() + 3) / 3),
        "S": this.getMilliseconds().toString().padStart(3, '0')
      };

      if (/(y+)/.test(fmt)) {
        fmt = fmt.replace(RegExp.$1, (this.getFullYear() + "").substr(4 - RegExp.$1.length));
      }

      for (let k in o) {
        if (new RegExp("(" + k + ")").test(fmt)) {
          fmt = fmt.replace(RegExp.$1, RegExp.$1.length == 1 ? o[k] : ("00" + o[k]).substr(("" + o[k]).length));
        }
      }
      return fmt;
    };

    function updateTime() {
      const now = new Date();
      timeDiv.innerHTML = now.format("hh:mm:ss.S");
      dateDiv.innerHTML = now.format("yyyy-MM-dd W");
    }

    setInterval(updateTime, 111);

    setInterval(() => {
      ctx.clearRect(0, 0, mycanvas.width, mycanvas.height);

      const numX = Math.floor(Math.random() * 10);
      const numY = Math.floor(Math.random() * 10);

      for (let i = 0; i < numX; i++) {
        StartPoint.x = Math.random() * window.innerWidth;
        StartPoint.y = Math.random() * window.innerHeight;
        drawLine({ x: 0, y: StartPoint.y }, { x: mycanvas.width, y: StartPoint.y });
      }

      for (let j = 0; j < numY; j++) {
        StartPoint.x = Math.random() * window.innerWidth;
        StartPoint.y = Math.random() * window.innerHeight;
        drawLine({ x: StartPoint.x, y: 0 }, { x: StartPoint.x, y: mycanvas.height });
      }
    }, 500);
  </script>
</body>
</html>
